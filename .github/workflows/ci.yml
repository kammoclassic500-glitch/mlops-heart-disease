name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test-train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      # Task 5: Linting - pipeline must fail loudly on lint errors
      - name: Lint with flake8
        run: |
          flake8 src api tests

      # Task 5: Model training step must run BEFORE tests, since the API
      # tests load the trained model artifact from disk.
      - name: Download dataset
        run: python data/download_data.py

      - name: Train model
        run: python src/train.py --data data/heart_disease_raw.csv

      # Task 5: Unit tests - pipeline must fail on test errors and give clear logs
      - name: Run unit tests with pytest
        run: |
          pytest tests/ -v --junitxml=reports/junit.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: reports/junit.xml

      - name: Upload trained model artifact
        uses: actions/upload-artifact@v4
        with:
          name: heart-disease-model
          path: models/heart_disease_model.joblib

  build-and-push-image:
    needs: lint-test-train
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download trained model artifact
        uses: actions/download-artifact@v4
        with:
          name: heart-disease-model
          path: models

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t heart-disease-api:${{ github.sha }} .

  
